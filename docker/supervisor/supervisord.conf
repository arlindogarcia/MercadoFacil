[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:laravel-fpm]
command=php-fpm
directory=/var/www
autostart=true
autorestart=true
startretries=3
startsecs=1
priority=100
redirect_stderr=true
stdout_logfile=/var/log/supervisor/fpm.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
directory=/var/www
autostart=true
autorestart=true
startretries=3
startsecs=2
priority=200
redirect_stderr=true
stdout_logfile=/var/log/supervisor/nginx.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/local/bin/run-queue-worker.sh --timeout=300 --queue=default --max-jobs=500 --tries=3 --backoff=5 --max-time=3600
directory=/var/www
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
startretries=10
startsecs=2
priority=400
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=3600

[program:laravel-scheduler]
command=php /var/www/artisan schedule:work
directory=/var/www
autostart=true
autorestart=true
startretries=10
startsecs=2
priority=400
user=www-data
stopwaitsecs=60
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
