# Mercado Fácil — Traefik / Portainer
#
# Notas:
#  - SESSION_DRIVER=file funciona com réplica única; para múltiplas use database ou redis.
#  - APP_URL deve bater exatamente com a URL pública (evita CSRF 419).
#  - Se o Traefik terminar TLS, configure SESSION_SECURE_COOKIE=true e X-Forwarded-Proto.
#
services:
  mercado-facil:
    image: registry.agntech.com.br/mercado-facil:latest
    container_name: mercadofacil
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      APP_NAME: "Mercado Fácil"
      APP_ENV: production
      APP_KEY: "VARIAVEL"
      APP_DEBUG: "false"
      APP_URL: "https://mercadofacil.agntech.com.br"
      LOG_CHANNEL: daily
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: VARIAVEL
      DB_USERNAME: VARIAVEL
      DB_PASSWORD: "VARIAVEL"
      BROADCAST_DRIVER: log
      CACHE_DRIVER: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      SESSION_SECURE_COOKIE: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: VARIAVEL
      MAIL_PORT: 587
      MAIL_USERNAME: VARIAVEL
      MAIL_PASSWORD: "VARIAVEL"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: VARIAVEL
      MAIL_FROM_NAME: "Mercado Fácil"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - storage:/var/www/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mercado-facil.rule=Host(`mercadofacil.agntech.com.br`)"
        - "traefik.http.routers.mercado-facil.entrypoints=websecure"
        - "traefik.http.routers.mercado-facil.tls=true"
        - "traefik.http.services.mercado-facil.loadbalancer.server.port=80"
    networks:
      - traefik
      - l2ov-att
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mercado-facil.rule=Host(`mercadofacil.agntech.com.br`)"
      - "traefik.http.routers.mercado-facil.entrypoints=websecure"
      - "traefik.http.routers.mercado-facil.tls=true"
      - "traefik.http.services.mercado-facil.loadbalancer.server.port=80"

volumes:
  storage:

networks:
  traefik:
    external: true
  l2ov-att:
    external: true
