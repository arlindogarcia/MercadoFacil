# Build da imagem e push para registry privado
#
# Secrets obrigatórios (Settings → Secrets → Actions):
#   REGISTRY          → registry.agntech.com.br (sem https://)
#   REGISTRY_USER     → usuário do registry
#   REGISTRY_PASSWORD → senha do registry

name: Build and push Docker image

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: mercado-facil

concurrency:
  group: docker-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
